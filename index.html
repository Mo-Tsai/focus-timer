<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Timer</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0e0e0f; --surface: #161618; --border: #2a2a2d;
        --accent: #e8ff47; --rest: #47d4e8; --yoga: #d4a5ff; --text: #f0f0ec; --muted: #6b6b70;
      }
      body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; padding-top: env(safe-area-inset-top); user-select: none; }
      .header h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 40px; }
      .clock-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 36px; }
      .clock-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
      .clock-track { fill: none; stroke: var(--border); stroke-width: 6; }
      .clock-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 754; stroke-dashoffset: 754; transition: stroke-dashoffset 0.5s linear, stroke 0.4s ease; }
      .clock-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
      .mode-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
      .time-display { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 300; line-height: 1; }
      .controls { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
      .btn { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; border: none; cursor: pointer; border-radius: 6px; padding: 12px 20px; transition: all 0.2s; }
      .btn-primary { background: var(--accent); color: #0e0e0f; }
      .btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
      .btn-yoga { background: transparent; color: var(--yoga); border: 1px solid var(--yoga); }
      .btn-yoga.active { background: var(--yoga); color: #0e0e0f; }
      .presets { display: flex; gap: 8px; margin-bottom: 36px; flex-wrap: wrap; justify-content: center; }
      .preset-btn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
      .preset-btn.active { border-color: var(--accent); color: var(--accent); }
      .settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 340px; margin-bottom: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .setting-item label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
      .setting-item input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 20px; text-align: center; outline: none; }
      .stats { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; width: 100%; max-width: 340px; }
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; text-align: center; }
      .stat-value { font-family: 'DM Mono', monospace; font-size: 24px; color: var(--text); display: block; }
      .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; }
      body.break-mode .clock-progress { stroke: var(--rest); }
      body.yoga-mode .clock-progress { stroke: var(--yoga); }
      body.break-mode .btn-primary { background: var(--rest); }
      .notify { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--accent); color: #0e0e0f; padding: 12px 24px; border-radius: 8px; transition: transform 0.3s; z-index: 999; }
      .notify.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="work-mode">
    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2863/2863-preview.mp3" preload="auto"></audio>
    <div class="notify" id="notify">⏰ 時間到！</div>
    <div class="header"><h1>Focus Timer</h1></div>
    
    <div class="clock-wrap">
      <svg class="clock-svg" viewBox="0 0 280 280">
        <circle class="clock-track" cx="140" cy="140" r="120"/>
        <circle class="clock-progress" id="progressRing" cx="140" cy="140" r="120"/>
      </svg>
      <div class="clock-center">
        <span class="mode-label" id="modeLabel">工作</span>
        <span class="time-display" id="timeDisplay">40:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">開始</button>
      <button class="btn btn-secondary" onclick="resetTimer()">重置</button>
      <button class="btn btn-yoga" id="yogaBtn" onclick="toggleYogaMode()">瑜伽模式</button>
    </div>

    <div class="presets">
      <button class="preset-btn" onclick="setPreset(25,5,this)">25/5</button>
      <button class="preset-btn active" onclick="setPreset(40,10,this)">40/10</button>
      <button class="preset-btn" onclick="setPreset(50,10,this)">50/10</button>
      <button class="preset-btn" onclick="setPreset(90,20,this)">90/20</button>
    </div>

    <div class="settings-panel">
      <div class="setting-item">
        <label>時間 (分)</label>
        <input type="number" id="workInput" value="40" onchange="updateSettings()">
      </div>
      <div class="setting-item" id="breakSetting">
        <label>休息 (分)</label>
        <input type="number" id="breakInput" value="10" onchange="updateSettings()">
      </div>
    </div>

    <div class="stats">
      <div class="stats-grid">
        <div class="stat-item"><span class="stat-value" id="statSessions">0</span><span class="stat-label">輪次</span></div>
        <div class="stat-item"><span class="stat-value" id="statWork">0</span><span class="stat-label">總分</span></div>
        <div class="stat-item"><span class="stat-value" id="statType" style="font-size:10px; color:var(--muted); padding-top:10px;">專注</span><span class="stat-label">類別</span></div>
      </div>
    </div>

    <script>
      let workMins=40, breakMins=10, totalSeconds=2400, remaining=2400, isRunning=false, isBreak=false, isYoga=false, timer=null, statsWork=0, statsSessions=0, endTime=null;
      const C=2*Math.PI*120, alarm = document.getElementById('alarmSound'), ring = document.getElementById('progressRing');
      ring.style.strokeDasharray=C; ring.style.strokeDashoffset=C;

      function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
      function updateDisplay(){
          document.getElementById('timeDisplay').textContent=fmt(remaining);
          document.getElementById('modeLabel').textContent = isYoga ? "瑜伽" : (isBreak ? "休息" : "工作");
          ring.style.strokeDashoffset = C * (remaining/totalSeconds);
      }
      
      function toggleYogaMode(){
          isYoga = !isYoga;
          document.getElementById('yogaBtn').classList.toggle('active');
          document.body.classList.toggle('yoga-mode');
          document.getElementById('breakSetting').style.opacity = isYoga ? "0.3" : "1";
          document.getElementById('statType').textContent = isYoga ? "瑜伽" : "專注";
          resetTimer();
      }

      function toggleTimer(){
          if(isRunning){
              clearInterval(timer); isRunning=false;
              document.getElementById('startBtn').textContent='繼續';
          }else{
              alarm.play().then(()=>{alarm.pause(); alarm.currentTime=0;}); 
              isRunning=true;
              document.getElementById('startBtn').textContent='暫停';
              endTime = Date.now() + (remaining * 1000);
              timer=setInterval(syncTick, 1000);
          }
      }

      function syncTick(){
          const now = Date.now();
          remaining = Math.max(0, Math.round((endTime - now) / 1000));
          updateDisplay();
          if(remaining<=0){
              clearInterval(timer); isRunning=false; onComplete();
          }
      }

      function onComplete(){
          alarm.play();
          if(isYoga){
              statsWork += workMins;
              showNotify('瑜伽練習完成 🙏');
              resetTimer();
          } else {
              if(!isBreak){
                  statsSessions++; statsWork+=workMins;
                  showNotify('工作完成！休息時間 ☕');
                  isBreak=true; totalSeconds=breakMins*60;
                  document.body.classList.add('break-mode');
              }else{
                  showNotify('休息結束！回歸工作 💪');
                  isBreak=false; totalSeconds=workMins*60;
                  document.body.classList.remove('break-mode');
              }
              remaining=totalSeconds;
          }
          updateDisplay(); updateStats();
          document.getElementById('startBtn').textContent='開始';
      }

      function resetTimer(){
          clearInterval(timer); alarm.pause(); alarm.currentTime=0;
          isRunning=false; isBreak=false; 
          remaining = isYoga ? (workMins * 60) : (workMins * 60);
          totalSeconds = remaining;
          document.body.classList.remove('break-mode');
          document.getElementById('startBtn').textContent='開始';
          updateDisplay();
      }

      function setPreset(w,b,el){
          if(isYoga) toggleYogaMode();
          workMins=w; breakMins=b;
          document.getElementById('workInput').value=w;
          document.getElementById('breakInput').value=b;
          document.querySelectorAll('.preset-btn').forEach(e=>e.classList.remove('active'));
          el.classList.add('active'); resetTimer();
      }

      function updateSettings(){
          workMins=parseInt(document.getElementById('workInput').value)||25;
          breakMins=parseInt(document.getElementById('breakInput').value)||5;
          resetTimer();
      }

      function updateStats(){
          document.getElementById('statSessions').textContent=statsSessions;
          document.getElementById('statWork').textContent=statsWork;
      }

      function showNotify(msg){
          const el=document.getElementById('notify'); el.textContent=msg;
          el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000);
      }
      updateDisplay();
    </script>
</body>
</html>
