<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Timer</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Focus">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg: #0e0e0f; --surface: #161618; --border: #2a2a2d; --accent: #e8ff47; --accent-dim: #b8cc2a; --rest: #47d4e8; --rest-dim: #2aa8bc; --text: #f0f0ec; --muted: #6b6b70; }
      body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; padding-top: env(safe-area-inset-top); user-select: none; -webkit-tap-highlight-color: transparent; }
      .header { text-align: center; margin-bottom: 40px; }
      .header h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; }
      .clock-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 36px; }
      .clock-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
      .clock-track { fill: none; stroke: var(--border); stroke-width: 6; }
      .clock-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 754; stroke-dashoffset: 754; transition: stroke-dashoffset 0.5s ease, stroke 0.4s ease; }
      .clock-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
      .mode-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
      .time-display { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 300; color: var(--text); line-height: 1; }
      .session-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
      .controls { display: flex; gap: 12px; margin-bottom: 32px; }
      .btn { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; border: none; cursor: pointer; border-radius: 6px; padding: 12px 24px; transition: all 0.2s; }
      .btn-primary { background: var(--accent); color: #0e0e0f; }
      .btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
      .presets { display: flex; gap: 8px; margin-bottom: 36px; }
      .preset-btn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
      .preset-btn.active { border-color: var(--accent); color: var(--accent); }
      .settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 340px; margin-bottom: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .setting-item label { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
      .setting-item input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 20px; text-align: center; outline: none; }
      .stats { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; width: 100%; max-width: 340px; }
      .stats-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
      .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      .stat-item { text-align: center; }
      .stat-value { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; color: var(--text); display: block; }
      .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; }
      body.break-mode .clock-progress { stroke: var(--rest); }
      body.break-mode .time-display { color: var(--rest); }
      body.break-mode .btn-primary { background: var(--rest); }
    </style>
</head>
<body>
    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="header"><h1>Focus Timer</h1></div>
    <div class="clock-wrap">
      <svg class="clock-svg" viewBox="0 0 280 280"><circle class="clock-track" cx="140" cy="140" r="120"/><circle class="clock-progress" id="progressRing" cx="140" cy="140" r="120"/></svg>
      <div class="clock-center">
        <span class="mode-label" id="modeLabel">工作</span>
        <span class="time-display" id="timeDisplay">40:00</span>
        <span class="session-count" id="sessionCount">第 1 輪</span>
      </div>
    </div>
    <div class="controls"><button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">開始</button><button class="btn btn-secondary" onclick="resetTimer()">重置</button></div>
    
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(25,5,this)">25/5</button>
      <button class="preset-btn active" onclick="setPreset(40,10,this)">40/10</button>
      <button class="preset-btn" onclick="setPreset(50,10,this)">50/10</button>
    </div>

    <div class="settings-panel">
      <div class="setting-item"><label>工作(分)</label><input type="number" id="workInput" value="40" min="1" onchange="updateSettings()"></div>
      <div class="setting-item"><label>休息(分)</label><input type="number" id="breakInput" value="10" min="1" onchange="updateSettings()"></div>
    </div>

    <div class="stats">
      <div class="stats-title">今日統計</div>
      <div class="stats-grid">
        <div class="stat-item"><span class="stat-value" id="statSessions">0</span><span class="stat-label">輪次</span></div>
        <div class="stat-item"><span class="stat-value" id="statWork">0</span><span class="stat-label">工作分</span></div>
        <div class="stat-item"><span class="stat-value" id="statBreak">0</span><span class="stat-label">休息分</span></div>
      </div>
    </div>

    <script>
      let workMins=40,breakMins=10,totalSeconds=2400,remaining=2400,isRunning=false,isBreak=false,timer=null,session=1,statsWork=0,statsBreak=0,statsSessions=0;
      let expectedEndTime = null;
      const C=2*Math.PI*120;
      const alarm = document.getElementById('alarmSound');
      document.getElementById('progressRing').style.strokeDasharray=C;

      function updateDisplay(){
        document.getElementById('timeDisplay').textContent = `${String(Math.floor(remaining/60)).padStart(2,'0')}:${String(remaining%60).padStart(2,'0')}`;
        document.getElementById('modeLabel').textContent = isBreak?'休息':'工作';
        document.getElementById('sessionCount').textContent = `第 ${session} 輪`;
        document.getElementById('progressRing').style.strokeDashoffset = C*(remaining/totalSeconds);
      }

      function toggleTimer(){
        if(isRunning){ clearInterval(timer); isRunning=false; document.getElementById('startBtn').textContent='繼續'; }
        else {
          // 啟動音效權限（iOS 必須透過使用者點擊觸發）
          alarm.play().then(() => { alarm.pause(); alarm.currentTime = 0; });
          
          if(remaining === totalSeconds && !isBreak) {
             const startShortcut = confirm("準備開始 40 分鐘專注？\n點擊確認將嘗試啟動系統提醒功能。\n(若出現網址無效請忽略，網頁仍會響鈴)");
             if(startShortcut) {
                // 如果捷徑名稱 FocusTimer 不符，這裡會噴錯
                window.location.href = "shortcuts://run-shortcut?name=FocusTimer";
             }
          }
          
          isRunning=true;
          expectedEndTime = Date.now() + (remaining * 1000);
          document.getElementById('startBtn').textContent='暫停';
          timer = setInterval(syncTimer, 1000);
        }
      }

      function syncTimer(){
        const now = Date.now();
        remaining = Math.max(0, Math.round((expectedEndTime - now) / 1000));
        updateDisplay();
        if(remaining <= 0){ clearInterval(timer); isRunning=false; onComplete(); }
      }

      // 當切換回網頁時自動校正時間 (處理背景休眠問題)
      document.addEventListener('visibilitychange', () => { if(!document.hidden && isRunning) syncTimer(); });

      function onComplete(){
        alarm.play(); // 播放網頁鬧鈴
        if(!isBreak){ statsSessions++; statsWork+=workMins; isBreak=true; totalSeconds=breakMins*60; document.body.classList.add('break-mode'); }
        else { statsBreak+=breakMins; isBreak=false; session++; totalSeconds=workMins*60; document.body.classList.remove('break-mode'); }
        remaining=totalSeconds; updateDisplay(); updateStats(); document.getElementById('startBtn').textContent='開始';
      }

      function resetTimer(){ clearInterval(timer); isRunning=false; isBreak=false; remaining=workMins*60; totalSeconds=remaining; document.body.classList.remove('break-mode'); document.getElementById('startBtn').textContent='開始'; updateDisplay(); }
      function setPreset(w,b,el){ workMins=w; breakMins=b; document.getElementById('workInput').value=w; document.getElementById('breakInput').value=b; document.querySelectorAll('.preset-btn').forEach(e=>e.classList.remove('active')); el.classList.add('active'); resetTimer(); }
      function updateSettings(){ workMins=parseInt(document.getElementById('workInput').value)||25; breakMins=parseInt(document.getElementById('breakInput').value)||5; resetTimer(); }
      function updateStats(){ document.getElementById('statSessions').textContent=statsSessions; document.getElementById('statWork').textContent=statsWork; document.getElementById('statBreak').textContent=statsBreak; }
      updateDisplay();
    </script>
</body>
</html>
