<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Timer</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg: #0e0e0f; --surface: #161618; --border: #2a2a2d; --accent: #e8ff47; --text: #f0f0ec; --muted: #6b6b70; }
      body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; padding-top: env(safe-area-inset-top); user-select: none; }
      .header h1 { font-size: 13px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 40px; }
      .clock-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 36px; }
      .clock-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
      .clock-track { fill: none; stroke: var(--border); stroke-width: 6; }
      .clock-progress { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 754; stroke-dashoffset: 754; transition: stroke-dashoffset 0.5s linear; }
      .clock-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
      .time-display { font-family: 'DM Mono', monospace; font-size: 56px; font-weight: 300; color: var(--text); }
      .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; width: 200px; }
      .btn { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; border: none; cursor: pointer; border-radius: 6px; padding: 12px 24px; text-align: center; transition: all 0.2s; }
      .btn-primary { background: var(--accent); color: #0e0e0f; }
      .btn-secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    </style>
</head>
<body>
    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <div class="header"><h1>Focus Timer</h1></div>
    <div class="clock-wrap">
      <svg class="clock-svg" viewBox="0 0 280 280"><circle class="clock-track" cx="140" cy="140" r="120"/><circle class="clock-progress" id="progressRing" cx="140" cy="140" r="120"/></svg>
      <div class="clock-center">
        <span id="modeLabel" style="color:var(--muted); font-size:11px; font-family:'DM Mono'">工作</span>
        <span class="time-display" id="timeDisplay">40:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">開始專注</button>
      <button class="btn btn-secondary" onclick="resetTimer()">重置計時器</button>
    </div>

    <script>
      let workMins=40, totalSeconds=2400, remaining=2400, isRunning=false, timer=null, endTime=null;
      const C=2*Math.PI*120, alarm = document.getElementById('alarmSound'), ring = document.getElementById('progressRing');
      ring.style.strokeDasharray=C; ring.style.strokeDashoffset=C;

      function updateDisplay(){
          document.getElementById('timeDisplay').textContent = `${String(Math.floor(remaining/60)).padStart(2,'0')}:${String(remaining%60).padStart(2,'0')}`;
          ring.style.strokeDashoffset = C * (remaining/totalSeconds);
      }

      function toggleTimer(){
          if(isRunning){
              clearInterval(timer); isRunning=false;
              document.getElementById('startBtn').textContent='繼續專注';
          } else {
              // 點擊即解鎖音效權限
              alarm.play().then(()=>{alarm.pause(); alarm.currentTime=0;}); 
              isRunning=true;
              document.getElementById('startBtn').textContent='暫停計時';
              // 記錄下「結束時刻」的絕對時間
              endTime = Date.now() + (remaining * 1000);
              timer = setInterval(syncTick, 1000);
          }
      }

      function syncTick(){
          const now = Date.now();
          // 用「現實時間」減去「目標結束時間」，即使背景暫停回來後也會自動校正
          remaining = Math.max(0, Math.round((endTime - now) / 1000));
          
          if(remaining <= 0){
              clearInterval(timer); isRunning=false;
              alarm.play(); // 時間到響鈴
              document.getElementById('startBtn').textContent='點擊停止鈴聲';
          }
          updateDisplay();
      }

      function resetTimer(){
          clearInterval(timer); alarm.pause(); alarm.currentTime=0;
          isRunning=false; remaining=workMins*60; totalSeconds=remaining;
          document.getElementById('startBtn').textContent='開始專注';
          updateDisplay();
      }
      updateDisplay();
    </script>
</body>
</html>
