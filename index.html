<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<title>Focus Timer</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0c;--fg:rgba(255,255,255,0.88);
  --dim:rgba(255,255,255,0.22);--border:rgba(255,255,255,0.08);
  --hi:rgba(255,255,255,0.16);
  --beta:#5b9cf6;--alpha:#52c97e;--theta:#a78bfa;
}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--fg);
  font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:28px;
  -webkit-font-smoothing:antialiased;
  transition:background 2s ease;
  overflow:hidden;
}
body.cf{background:#07090f;}
body.cb{background:#070f09;}
body.cm{background:#0c0810;}

.app-label{font-size:9px;letter-spacing:6px;color:rgba(255,255,255,0.1);text-transform:uppercase;}

.tabs{
  display:flex;gap:2px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:14px;padding:4px;
}
.tab{
  padding:10px 32px;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--dim);
  background:transparent;border:none;cursor:pointer;
  border-radius:10px;transition:all 0.3s;font-weight:500;
  -webkit-tap-highlight-color:transparent;
}
.tab.on{
  background:rgba(255,255,255,0.1);color:var(--fg);
  box-shadow:0 1px 3px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
}

.timer-area{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;}

.t-track{
  cursor:ns-resize;padding:16px 40px;
  touch-action:none;border-radius:20px;
  border:1px solid transparent;
  transition:border-color 0.2s,background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.t-track:hover,.t-track:active{
  background:rgba(255,255,255,0.03);border-color:var(--border);
}
.t-num{
  font-size:clamp(80px,22vw,120px);
  font-weight:200;letter-spacing:-6px;
  font-variant-numeric:tabular-nums;line-height:1;
  transition:color 0.5s;color:rgba(255,255,255,0.9);
}
.t-num.hl{color:var(--beta);}

.b-track{
  display:inline-flex;align-items:center;gap:8px;
  cursor:ns-resize;padding:8px 20px;
  border-radius:24px;border:1px solid transparent;
  transition:all 0.2s;touch-action:none;
  -webkit-tap-highlight-color:transparent;
}
.b-track:hover,.b-track:active{background:rgba(255,255,255,0.05);border-color:var(--border);}
.b-track.hl{border-color:rgba(91,156,246,.4);}
.b-lbl{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.b-val{font-size:13px;letter-spacing:1px;color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums;}

.phase{font-size:10px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;height:18px;transition:color 0.5s;}

.scroll-hint{
  font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.1);
  text-transform:uppercase;display:flex;align-items:center;gap:6px;
}
.scroll-hint::before,.scroll-hint::after{content:'';display:block;width:16px;height:1px;background:rgba(255,255,255,0.08);}

.wave-row{display:flex;gap:6px;}
.wb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:12px 16px;min-width:90px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:12px;cursor:pointer;transition:all 0.25s;color:var(--dim);
  -webkit-tap-highlight-color:transparent;
}
.wb:active{transform:scale(0.97);}
.wb .wn{font-size:13px;letter-spacing:1px;font-weight:500;}
.wb .ws{font-size:9px;letter-spacing:1px;opacity:0.6;}
.wb.on.beta {background:rgba(91,156,246,.1);border-color:rgba(91,156,246,.4);color:var(--beta);}
.wb.on.alpha{background:rgba(82,201,126,.1);border-color:rgba(82,201,126,.4);color:var(--alpha);}
.wb.on.theta{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);color:var(--theta);}

.wst{
  font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,.08);
  display:flex;align-items:center;gap:7px;height:14px;
  transition:color 0.6s;text-transform:uppercase;
}
.wd{width:4px;height:4px;border-radius:50%;background:currentColor;}
.wst.beta{color:var(--beta);}.wst.alpha{color:var(--alpha);}.wst.theta{color:var(--theta);}

.btn-row{display:flex;gap:10px;}
.btn{
  padding:15px 0;flex:1;font-size:11px;
  letter-spacing:2.5px;text-transform:uppercase;font-weight:500;
  border-radius:12px;cursor:pointer;
  transition:all 0.18s;border:1px solid var(--border);
  background:rgba(255,255,255,0.04);color:var(--dim);
  min-width:120px;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.97);}
.btn:hover{border-color:var(--hi);color:var(--fg);}
.btn-start{
  background:rgba(255,255,255,0.92);color:#000;
  border-color:rgba(255,255,255,.9);
  box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 6px 20px rgba(0,0,0,.4);
}
.btn-start:hover{background:#fff;}
.btn-start:disabled{opacity:0.28;cursor:default;pointer-events:none;}
.btn-sr.armed{border-color:rgba(220,80,60,.5);color:rgba(220,80,60,.9);background:rgba(220,80,60,.07);}

.mute-row{display:flex;justify-content:center;}
.mbtn{
  padding:8px 20px;border:1px solid var(--border);
  background:transparent;color:var(--dim);
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;border-radius:20px;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.mbtn:hover{border-color:var(--hi);color:var(--fg);}
.mbtn.muted{color:rgba(220,80,60,.7);border-color:rgba(220,80,60,.35);}

.rnd{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.08);min-height:14px;}

body.cm .t-num{animation:breathe 6s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.45;}50%{opacity:.95;}}
</style>
</head>
<body>

<div class="app-label">Focus Timer</div>

<div class="tabs">
  <button class="tab on" id="tabFocus" onclick="setMode('focus')">Focus</button>
  <button class="tab" id="tabMed" onclick="setMode('meditate')">Meditate</button>
</div>

<div class="timer-area">
  <div class="t-track" id="mainTrack">
    <div class="t-num" id="dispNum">40:00</div>
  </div>
  <div id="breakWrap">
    <div class="b-track" id="breakTrack">
      <span class="b-lbl">Break</span>
      <span class="b-val" id="breakNum">10 min</span>
    </div>
  </div>
  <div class="scroll-hint" id="hint">scroll or drag to set time</div>
  <div class="phase" id="phaseEl"></div>
</div>

<div class="wave-row">
  <button class="wb beta on" id="waveBeta" onclick="pickWave('beta',this)">
    <span class="wn">Beta</span><span class="ws">25 Hz · Focus</span>
  </button>
  <button class="wb alpha" id="waveAlpha" onclick="pickWave('alpha',this)">
    <span class="wn">Alpha</span><span class="ws">12 Hz · Relax</span>
  </button>
  <button class="wb theta" id="waveTheta" onclick="pickWave('theta',this)">
    <span class="wn">Theta</span><span class="ws">7 Hz · Meditate</span>
  </button>
</div>

<div class="wst" id="waveStatus"><span class="wd"></span><span id="waveTxt">Sound off</span></div>

<div class="btn-row">
  <button class="btn btn-start" id="btnStart" onclick="go()">Start</button>
  <button class="btn btn-sr" id="btnSR" onclick="sr()">Stop</button>
</div>

<div class="mute-row">
  <button class="mbtn" id="muteBtn" onclick="toggleMute()">🎧 Sound On</button>
</div>

<div class="rnd" id="rndEl"></div>

<script>
// ── State ────────────────────────────────────────
let appMode = 'focus';
let workMin = 40, breakMin = 10, medMin = 20;
let seconds = workMin * 60;
let isRunning = false, isBreak = false;
let ticker = null, rounds = 0, pts = 0;
let isMuted = false, selectedWave = 'beta';
let srArmed = false, srTimer = null;

// ── Audio ─────────────────────────────────────────
let audioCtx = null, gainNode = null, oscL = null, oscR = null;

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = isMuted ? 0 : 0.18;
  gainNode.connect(audioCtx.destination);
}

function playBeat(type) {
  ensureAudio();
  stopBeat(false);
  const hz = { beta: 25, alpha: 12, theta: 7 }[type] || 12;
  const base = 200;
  const merger = audioCtx.createChannelMerger(2);
  oscL = audioCtx.createOscillator();
  oscR = audioCtx.createOscillator();
  oscL.type = oscR.type = 'sine';
  oscL.frequency.value = base;
  oscR.frequency.value = base + hz;
  const gL = audioCtx.createGain(), gR = audioCtx.createGain();
  gL.gain.value = gR.gain.value = 0.5;
  oscL.connect(gL); oscR.connect(gR);
  gL.connect(merger, 0, 0);
  gR.connect(merger, 0, 1);
  merger.connect(gainNode);
  oscL.start(); oscR.start();
  updateWaveUI(type);
}

function stopBeat(clearUI = true) {
  [oscL, oscR].forEach(o => { try { o && o.stop(); } catch (e) {} });
  oscL = oscR = null;
  if (clearUI) {
    document.getElementById('waveStatus').className = 'wst';
    document.getElementById('waveTxt').textContent = 'Sound off';
  }
}

function updateWaveUI(type) {
  document.getElementById('waveStatus').className = 'wst ' + type;
  const map = { beta: 'Beta 25 Hz', alpha: 'Alpha 12 Hz', theta: 'Theta 7 Hz' };
  document.getElementById('waveTxt').textContent = map[type] + ' · Playing';
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = isMuted ? '🔇 Muted' : '🎧 Sound On';
  btn.classList.toggle('muted', isMuted);
  if (gainNode) gainNode.gain.value = isMuted ? 0 : 0.18;
}

// ── Wave ──────────────────────────────────────────
function pickWave(type, el) {
  selectedWave = type;
  document.querySelectorAll('.wb').forEach(b => b.classList.remove('on', 'beta', 'alpha', 'theta'));
  el.classList.add('on', type);
  if (isRunning && !isBreak && appMode === 'focus') playBeat(type);
}

// ── Mode ──────────────────────────────────────────
function setMode(mode) {
  fullStop();
  appMode = mode;
  document.getElementById('tabFocus').classList.toggle('on', mode === 'focus');
  document.getElementById('tabMed').classList.toggle('on', mode === 'meditate');
  document.getElementById('breakWrap').style.display = mode === 'focus' ? 'block' : 'none';
  document.body.className = mode === 'meditate' ? 'cm' : '';

  if (mode === 'meditate') {
    seconds = medMin * 60;
    document.querySelectorAll('.wb').forEach(b => b.classList.remove('on', 'beta', 'alpha', 'theta'));
    document.getElementById('waveTheta').classList.add('on', 'theta');
    selectedWave = 'theta';
  } else {
    seconds = workMin * 60;
  }
  render();
  setPhase('');
}

// ── Scroll / Drag ─────────────────────────────────
function adjustMain(delta) {
  if (isRunning) return;
  if (appMode === 'meditate') medMin = clamp(medMin + delta, 1, 180);
  else workMin = clamp(workMin + delta, 1, 240);
  seconds = (appMode === 'meditate' ? medMin : workMin) * 60;
  render();
  flashEl(document.getElementById('dispNum'));
  document.getElementById('hint').style.opacity = '0';
}

function adjustBreak(delta) {
  if (isRunning) return;
  breakMin = clamp(breakMin + delta, 1, 60);
  render();
  flashEl(document.getElementById('breakTrack'));
}

function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

function flashEl(el) {
  el.classList.add('hl');
  clearTimeout(el._ft);
  el._ft = setTimeout(() => el.classList.remove('hl'), 600);
}

// Wheel
let accMain = 0, accBreak = 0;
function onWheelMain(e) {
  e.preventDefault();
  accMain -= e.deltaY * (e.deltaMode === 1 ? 4 : 0.05);
  const s = Math.trunc(accMain);
  if (s) { adjustMain(s); accMain -= s; }
}
function onWheelBreak(e) {
  e.preventDefault();
  accBreak -= e.deltaY * (e.deltaMode === 1 ? 4 : 0.05);
  const s = Math.trunc(accBreak);
  if (s) { adjustBreak(s); accBreak -= s; }
}

// Mouse drag
function makeDrag(adjustFn) {
  return function(e) {
    if (e.button !== 0) return;
    let acc = 0, lastY = e.clientY;
    const onMove = ev => {
      acc += lastY - ev.clientY;
      lastY = ev.clientY;
      const steps = Math.trunc(acc / 10);
      if (steps) { adjustFn(steps); acc -= steps * 10; }
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
}

// Touch drag
function makeTouch(adjustFn) {
  return function(e) {
    let acc = 0, lastY = e.touches[0].clientY;
    const onMove = ev => {
      acc += lastY - ev.touches[0].clientY;
      lastY = ev.touches[0].clientY;
      const steps = Math.trunc(acc / 10);
      if (steps) { adjustFn(steps); acc -= steps * 10; }
    };
    const onEnd = () => {
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onEnd);
    };
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);
  };
}

// Attach events after DOM ready
document.getElementById('mainTrack').addEventListener('wheel', onWheelMain, { passive: false });
document.getElementById('mainTrack').addEventListener('mousedown', makeDrag(adjustMain));
document.getElementById('mainTrack').addEventListener('touchstart', makeTouch(adjustMain));
document.getElementById('breakTrack').addEventListener('wheel', onWheelBreak, { passive: false });
document.getElementById('breakTrack').addEventListener('mousedown', makeDrag(adjustBreak));
document.getElementById('breakTrack').addEventListener('touchstart', makeTouch(adjustBreak));

// ── Timer ─────────────────────────────────────────
function go() {
  if (isRunning) return;
  isRunning = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStart').textContent = 'Running';
  document.getElementById('hint').style.display = 'none';
  srArmed = false;
  document.getElementById('btnSR').textContent = 'Stop';
  document.getElementById('btnSR').classList.remove('armed');

  if (appMode === 'meditate') {
    seconds = medMin * 60;
    document.body.className = 'cm';
    setPhase('Meditate'); document.getElementById('phaseEl').style.color = 'rgba(167,139,250,.7)';
    playBeat('theta');
  } else if (!isBreak) {
    seconds = workMin * 60;
    document.body.className = 'cf';
    setPhase('Focus'); document.getElementById('phaseEl').style.color = 'rgba(91,156,246,.7)';
    playBeat(selectedWave);
  } else {
    seconds = breakMin * 60;
    document.body.className = 'cb';
    setPhase('Break'); document.getElementById('phaseEl').style.color = 'rgba(82,201,126,.7)';
    playBeat('alpha');
  }

  ticker = setInterval(tickFn, 1000);
}

function tickFn() {
  seconds--;
  render();
  if (seconds > 0) return;
  clearInterval(ticker); ticker = null;

  if (appMode === 'meditate') { done(); return; }

  if (!isBreak) {
    rounds++; pts += workMin;
    document.getElementById('rndEl').textContent = rounds + ' rounds · ' + pts + ' pts';
    isBreak = true;
    seconds = breakMin * 60;
    document.body.className = 'cb';
    setPhase('Break'); document.getElementById('phaseEl').style.color = 'rgba(82,201,126,.7)';
    playBeat('alpha');
    ticker = setInterval(tickFn, 1000);
  } else {
    isBreak = false;
    done();
  }
}

function done() {
  isRunning = false;
  stopBeat();
  document.body.className = appMode === 'meditate' ? 'cm' : '';
  setPhase('Done ✓'); document.getElementById('phaseEl').style.color = 'rgba(255,255,255,.4)';
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').textContent = 'Start';
  document.getElementById('btnSR').textContent = 'Stop';
  document.getElementById('btnSR').classList.remove('armed');
  srArmed = false;
  seconds = appMode === 'meditate' ? medMin * 60 : workMin * 60;
  render();
  document.getElementById('hint').style.display = 'flex';
  document.getElementById('hint').style.opacity = '1';
}

function fullStop() {
  isRunning = false; isBreak = false;
  clearInterval(ticker); ticker = null;
  clearTimeout(srTimer); srTimer = null;
  stopBeat(); srArmed = false;
  document.body.className = '';
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').textContent = 'Start';
  document.getElementById('btnSR').textContent = 'Stop';
  document.getElementById('btnSR').classList.remove('armed');
  document.getElementById('hint').style.display = 'flex';
  document.getElementById('hint').style.opacity = '1';
}

function sr() {
  if (!srArmed) {
    if (isRunning) {
      isRunning = false;
      clearInterval(ticker); ticker = null;
      stopBeat();
      document.body.className = appMode === 'meditate' ? 'cm' : '';
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStart').textContent = 'Start';
      setPhase('Stopped'); document.getElementById('phaseEl').style.color = 'rgba(255,255,255,.25)';
      srArmed = true;
      document.getElementById('btnSR').textContent = 'Reset';
      document.getElementById('btnSR').classList.add('armed');
      srTimer = setTimeout(() => {
        srArmed = false;
        document.getElementById('btnSR').textContent = 'Stop';
        document.getElementById('btnSR').classList.remove('armed');
      }, 4000);
    }
  } else {
    clearTimeout(srTimer);
    isBreak = false;
    seconds = appMode === 'meditate' ? medMin * 60 : workMin * 60;
    render();
    setPhase(''); document.getElementById('phaseEl').style.color = '';
    srArmed = false;
    document.getElementById('btnSR').textContent = 'Stop';
    document.getElementById('btnSR').classList.remove('armed');
    document.getElementById('hint').style.display = 'flex';
    document.getElementById('hint').style.opacity = '1';
  }
}

// ── Render ────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function render() {
  const v = isRunning ? seconds : (appMode === 'meditate' ? medMin * 60 : (!isBreak ? workMin * 60 : breakMin * 60));
  document.getElementById('dispNum').textContent = pad(Math.floor(v / 60)) + ':' + pad(v % 60);
  document.getElementById('breakNum').textContent = breakMin + ' min';
}

function setPhase(t) { document.getElementById('phaseEl').textContent = t; }

// ── Wake Lock ─────────────────────────────────────
let wakeLock = null;
async function reqWake() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
async function relWake() {
  try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch (e) {}
}
document.getElementById('btnStart').addEventListener('click', reqWake);
document.getElementById('btnSR').addEventListener('click', relWake);

render();
</script>
</body>
</html>
